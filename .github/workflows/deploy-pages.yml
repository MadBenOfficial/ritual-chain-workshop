name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      BUILD_FOR_PAGES: "1"
      PAGES_BASE_PATH: "/ritual-chain-workshop"
      NEXT_PUBLIC_CONTRACT_ADDRESS: "0x47CcF584DB2482B2A339945BC34E0368317CBFEF"
      NEXT_PUBLIC_RITUAL_RPC_URL: "https://rpc.ritualfoundation.org"
      NEXT_PUBLIC_RITUAL_CHAIN_ID: "1979"
      NEXT_PUBLIC_RITUAL_EXECUTOR_ADDRESS: "0xB42e435c4252A5a2E7440e37B609F00c61a0c91B"
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: "219254c3130109ce4a7da6b7ce31982f"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build static export
        run: npm run build
      - name: Disable Jekyll
        run: touch out/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
